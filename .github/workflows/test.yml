name: Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  hub-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -e ".[dev]"
      - run: python -m pytest hub/tests/ -v

  relay-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: cd relay && bun install --no-summary && bun test
